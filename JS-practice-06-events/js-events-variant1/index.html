<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практична робота 6 - Варіант 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="card form-section">
            <h2>Контактна форма</h2>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                <span class="progress-text" id="progressText">0%</span>
            </div>
            
            <form id="contactForm" novalidate>
                <div class="form-group" data-field="name">
                    <label for="userName">Ім'я</label>
                    <div class="input-wrapper">
                        <input type="text" id="userName" placeholder="Введіть ваше ім'я" required>
                        <span class="icon"></span>
                    </div>
                    <span class="error-message"></span>
                </div>

                <div class="form-group" data-field="email">
                    <label for="userEmail">Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="userEmail" placeholder="example@email.com" required>
                        <span class="icon"></span>
                    </div>
                    <span class="error-message"></span>
                </div>

                <div class="form-group" data-field="phone">
                    <label for="userPhone">Телефон</label>
                    <div class="input-wrapper">
                        <input type="tel" id="userPhone" placeholder="+380XXXXXXXXX" required>
                        <span class="icon"></span>
                    </div>
                    <span class="error-message"></span>
                </div>

                <div class="form-group" data-field="message">
                    <label for="userMessage">Повідомлення (20-500 символів)</label>
                    <div class="input-wrapper">
                        <textarea id="userMessage" rows="5" placeholder="Ваше повідомлення..." required></textarea>
                        <span class="icon"></span>
                    </div>
                    <span class="error-message"></span>
                </div>

                <button type="submit" id="submitBtn" disabled>Відправити</button>
            </form>
        </section>

        <section class="card search-section">
            <h2>Пошук студентів</h2>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Почніть вводити ім'я...">
            </div>
            <ul id="resultsList" class="results-list">
                </ul>
            <div id="noResults" class="no-results hidden">Нічого не знайдено!</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
