<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практична робота 6 - Частина 1 - Варіант 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <header>
            <h1>Зворотній зв'язок</h1>
            <div class="progress-wrapper">
                <div class="progress-bar" id="progressBar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <p class="progress-status">Заповнено: <span id="progressPercent">0%</span></p>
        </header>

        <form id="advancedForm" novalidate>
            <div class="field-group" data-field="name">
                <div class="input-container">
                    <input type="text" id="userName" name="name" placeholder=" " required>
                    <label for="userName">Ваше ім'я</label>
                    <span class="status-icon"></span>
                </div>
                <p class="error-text">Тільки літери, мін. 2 символи</p>
            </div>

            <div class="field-group" data-field="email">
                <div class="input-container">
                    <input type="email" id="userEmail" name="email" placeholder=" " required>
                    <label for="userEmail">Email адреса</label>
                    <span class="status-icon"></span>
                </div>
                <p class="error-text">Введіть коректний email</p>
            </div>

            <div class="field-group" data-field="phone">
                <div class="input-container">
                    <input type="tel" id="userPhone" name="phone" placeholder=" " required>
                    <label for="userPhone">Телефон (+380...)</label>
                    <span class="status-icon"></span>
                </div>
                <p class="error-text">Формат: +380XXXXXXXXX</p>
            </div>

            <div class="field-group" data-field="subject">
                <div class="input-container">
                    <select id="userSubject" name="subject" required>
                        <option value="" disabled selected hidden></option>
                        <option value="support">Технічна підтримка</option>
                        <option value="sales">Відділ продажу</option>
                        <option value="other">Інше</option>
                    </select>
                    <label for="userSubject" class="select-label">Оберіть тему</label>
                    <span class="status-icon"></span>
                </div>
                <p class="error-text">Будь ласка, оберіть тему</p>
            </div>

            <div class="field-group" data-field="message">
                <div class="input-container">
                    <textarea id="userMessage" name="message" placeholder=" " maxlength="500" required></textarea>
                    <label for="userMessage">Ваше повідомлення</label>
                </div>
                <div class="textarea-footer">
                    <p class="error-text">Від 20 до 500 символів</p>
                    <p class="char-counter"><span id="currentChar">0</span>/500</p>
                </div>
            </div>

            <button type="submit" id="submitBtn" disabled>
                <span class="btn-text">Відправити повідомлення</span>
                <span class="loader"></span>
            </button>
        </form>

        <div id="successMessage" class="success-overlay hidden">
            <div class="success-content">
                <div class="check-animation">✓</div>
                <h2>Дякуємо!</h2>
                <p>Ваше повідомлення успішно надіслано.</p>
                <button onclick="location.reload()">Надіслати ще раз</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
